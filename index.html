<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
            overflow: hidden;
        }

        h1 {
            font-family: Arial, sans-serif;
            font-size: 64px;
            font-weight: bold;
            background: linear-gradient(
                90deg,
                red,
                orange,
                yellow,
                lime,
                cyan,
                blue,
                violet,
                red
            );
            background-size: 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow 5s linear infinite;
            text-align: center;
        }

        @keyframes rainbow {
            0% {
                background-position: 0%;
            }
            100% {
                background-position: 400%;
            }
        }
    </style>
</head>
<body>

<h1>план 100% правда-правда</h1>

</body>
</html>
